<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
  <title>Podium Copy</title>
  <link rel="stylesheet" href="css/podium.css">
  <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/loadingio/loading.css@v2.0.0/dist/loading.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
  <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
  <script src="js/slide1.js" defer></script>
  <script src="js/slide2.js" defer></script>
  <script src="js/index.js" defer></script>
</head>
<body>
  <div class="page">
    <div class="podium">
      <div class="podiumBack">
        <div class="topPodium"></div>
        <div class="bottomPodium">
          <div class="step step-2">
            <img src="img/podium/2.jpg" alt="No.2 Movie" class="step-img">
            2</div>
          <div class="step step-1">
            <img src="img/podium/1.png" alt="No.1 Movie" class="step-img">
            1</div>
          <div class="step step-3">
            <img src="img/podium/3.png" alt="No.3 Movie" class="step-img">
            3</div>
        </div>
      </div>
    </div>
    


    <div class="list">
      <div class="list-item">
        <img src="img/podium/titanic.jpg" alt="Titanic" class="item-img">
        <div class="item-content">
          <div class="item-top">
            <span class="item-title">TITANIC</span>
            <div class="item-circle bg-red">4</div>
          </div>
          <div class="item-bottom">
            <div class="progress-bar"><div class="progress-fill" style="width: 78%;"></div></div>
            <span class="item-percent">78%</span>
          </div>
        </div>
      </div>

      <div class="list-item">
        <img src="img/podium/blackPanther.png" alt="Black Panther" class="item-img">
        <div class="item-content">
          <div class="item-top">
            <span class="item-title">BLACK PANTHER</span>
            <div class="item-circle bg-red">5</div>
          </div>
          <div class="item-bottom">
            <div class="progress-bar"><div class="progress-fill" style="width: 67%;"></div></div>
            <span class="item-percent">67%</span>
          </div>
        </div>
      </div>

      <div class="list-item">
        <img src="img/podium/lalaland.png" alt="La La Land" class="item-img">
        <div class="item-content">
          <div class="item-top">
            <span class="item-title">LA LA LAND</span>
            <div class="item-circle bg-red">6</div>
          </div>
          <div class="item-bottom">
            <div class="progress-bar"><div class="progress-fill" style="width: 56%;"></div></div>
            <span class="item-percent">56%</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
